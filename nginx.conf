# NGINX 配置文件
# 用于解决跨域问题，支持带 cookie 的请求

worker_processes  1;
events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志配置
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 服务器配置
    server {
        listen       80;
        server_name  localhost;

        # 根目录配置
        location / {
            root   html;
            index  index.html index.htm;
        }

        # 反向代理到后端 API 服务器
        location /api/ {
            proxy_pass http://localhost:8088;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 支持带 cookie 的跨域请求
            proxy_cookie_domain localhost:8088 localhost;
            
            # 跨域配置
            add_header Access-Control-Allow-Origin "http://localhost" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            # 处理 OPTIONS 预检请求
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 静态文件配置
        location /static/ {
            alias c:/Users/Administrator/Documents/GitHub/AzureCanvas/src/main/resources/static/;
            expires 30d;
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}