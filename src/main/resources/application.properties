spring.application.name=spring
server.port=8088
spring.main.allow-circular-references=true

api.route=/api/

#spring.datasource.url=jdbc:h2:tcp://localhost:9092/default
#spring.datasource.url=jdbc:mysql://192.168.1.103:3306/azurecanvas?serverTimezone=GMT%2B8
#spring.datasource.url=jdbc:mysql://localhost:3306/azurecanvas?serverTimezone=GMT%2B8
#spring.datasource.username=root
#spring.datasource.password=dadam$1900
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:h2:mem:azurecanvas;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.data.redis.host=192.168.1.103
spring.data.redis.port=6379
spring.data.redis.password=

spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=YourSecretKeyForJwtTokenGeneration1234567890
jwt.expiration=86400000

# 禁用启动时的 ES 索引创建检查，防止连接失败导致应用崩溃
spring.data.elasticsearch.repositories.setup-index=false
spring.elasticsearch.uris=http://localhost:9200
# 设置较短的连接超时，防止卡死
spring.elasticsearch.connection-timeout=2s
spring.elasticsearch.socket-timeout=2s

