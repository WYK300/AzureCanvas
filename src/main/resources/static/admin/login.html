<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MUST星河论坛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.dark_mode.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.primary.css">
    <link rel="stylesheet" href="../css/app.major.css">
    <link rel="stylesheet" href="../css/attributes.texts.css">
    <link rel="stylesheet" href="../css/botpage/page.adminlogin.major.css">
</head>

<body class="light-mode">
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-crown"></i>
            <h1>登录</h1>
            <p>欢迎回来</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名 / 邮箱 / 手机号</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名、邮箱或手机号"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">登录</button>
                <a href="../auth/register.html" class="btn btn-primary">注册</a>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div class="auth-footer">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </div>

    <script>
        // 自动检测 API 基础地址
        const API_BASE = window.location.origin === 'http://127.0.0.1:5500' ? 'http://localhost:8088' : '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 清空消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // 存储token
                    localStorage.setItem('token', data.token);
                    successMessage.textContent = '登录成功，正在跳转...';
                    successMessage.style.display = 'block';
                    // 根据用户角色跳转
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            // 管理员跳转到机器人管理页面
                            window.location.href = 'robots.html';
                        } else if (data.user.role === 'moderator') {
                            // 版主跳转到个人中心
                            window.location.href = '../user/user.html';
                        } else {
                            // 普通用户跳转到论坛首页
                            window.location.href = '../forum/index.html';
                        }
                    }, 1000);
                } else {
                    const error = await response.text();
                    errorMessage.textContent = '登录失败：' + error;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../js/effects/mouse-ripple.js"></script>
</body>

</html>
