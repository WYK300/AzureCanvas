    <style>
        @layer components {
            :root {
                --radius: 1rem;
                --text-white: hsl(0 0% 100%);
                --text-white-80: hsl(0 0% 100% / 0.8);
                --text-white-60: hsl(0 0% 100% / 0.6);
                --text-white-50: hsl(0 0% 100% / 0.5);
            }

            .liquid-glass {
                background: rgba(255, 255, 255, 0.01);
                background-blend-mode: luminosity;
                backdrop-filter: blur(4px);
                border: none;
                box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
                position: relative;
                overflow: hidden;
            }

            .liquid-glass::before {
                content: '';
                position: absolute;
                inset: 0;
                padding: 1.4px;
                background: linear-gradient(180deg,
                        rgba(255, 255, 255, 0.45) 0%,
                        rgba(255, 255, 255, 0.15) 20%,
                        transparent 40%,
                        transparent 60%,
                        rgba(255, 255, 255, 0.15) 80%,
                        rgba(255, 255, 255, 0.45) 100%);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                border-radius: inherit;
                pointer-events: none;
            }

            .liquid-glass-strong {
                background: rgba(255, 255, 255, 0.01);
                background-blend-mode: luminosity;
                backdrop-filter: blur(50px);
                border: none;
                box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.15);
                position: relative;
                overflow: hidden;
            }

            .liquid-glass-strong::before {
                content: '';
                position: absolute;
                inset: 0;
                padding: 0.8px;
                background: linear-gradient(180deg,
                        rgba(255, 255, 255, 0.5) 0%,
                        rgba(255, 255, 255, 0.2) 20%,
                        transparent 40%,
                        transparent 60%,
                        rgba(255, 255, 255, 0.2) 80%,
                        rgba(255, 255, 255, 0.5) 100%);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                border-radius: inherit;
                pointer-events: none;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: transparent;
            overflow: hidden;
            color: var(--text-white);
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;

        }

        .video-background video {

        .login-header {

        .login-header h2 {

            color: var(--text-white);
            margin-bottom: 0.5rem;
        }

        .login-header p {

            color: var(--text-white-60);
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-white-80);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: var(--text-white-50);
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .login-submit {
            width: 100%;
            padding: 0.875rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.15);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .login-submit:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.2);
        }

        .login-submit:active {
            transform: scale(0.98);

        .login-footer {

        .login-footer a {

        .pills-container {

    <script>
        // 自动检测 API 基础地址
        const API_BASE = window.location.origin === 'http://127.0.0.1:5500' ? 'http://localhost:8088' : '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 清空消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // 存储token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    successMessage.textContent = '登录成功，正在跳转...';
                    successMessage.style.display = 'block';
                    // 根据用户角色跳转
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            // 管理员跳转到机器人管理页面
                            window.location.href = '../admin/robots.html';
                        } else if (data.user.role === 'moderator') {
                            // 版主跳转到个人中心
                            window.location.href = '../user/user.html';
                        } else {
                            // 普通用户跳转到论坛首页
                            window.location.href = '../forum/index.html';
                        }
                    }, 1000);
                } else {
                    const error = await response.text();
                    errorMessage.textContent = '登录失败：' + error;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            }
        });
    </script>
    <script src="../js/effects/mouse-ripple.js"></script>
    <script>
        // 页面加载完成后初始化鼠标水纹特效
        window.addEventListener('DOMContentLoaded', () => {
            // 可自定义配置（适配登录页）
            const ripple = new LusionRipple({
                cursorColor: '#0066cc', // 光标改为蓝色（匹配登录页）
                waveStrength: 0.012,    // 降低波纹强度，更柔和
                bgColor: 'transparent'  // 登录页透明背景
            });
            ripple.init();

            // 页面卸载时销毁特效
            window.addEventListener('beforeunload', () => {
                ripple.destroy();
            });
        });
    </script>
</body>
