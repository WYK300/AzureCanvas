<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm h-14 flex items-center px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-purple-600 font-black text-xl">
            <span>闲置</span><span class="text-purple-700">AzureTrade</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6 pt-6 px-4 pb-10">

        <!-- 左侧导航 -->
        <aside class="w-full md:w-56 flex-shrink-0">
            <div class="bg-white rounded-2xl p-5 shadow-sm sticky top-20">
                <nav class="space-y-0.5 text-sm">
                    <a href="profile.html" class="flex items-center space-x-3 px-4 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition">
                        <span>🏠</span><span>我的空间</span>
                    </a>

                    <!-- 我的交易（可展开） -->
                    <div>
                        <div class="flex items-center justify-between px-4 py-2.5 text-gray-800 font-bold cursor-pointer hover:bg-gray-50 rounded-lg transition" id="trade-toggle">
                            <div class="flex items-center space-x-3"><span>📋</span><span>我的交易</span></div>
                            <svg class="w-3.5 h-3.5 text-gray-400 transition-transform rotate-180" id="trade-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                        <div id="trade-sub" class="ml-6 space-y-0.5">
                            <a href="mypublish.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我发布的</span>
                                <span id="sidebar-publish-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="sales.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我卖出的</span>
                                <span id="sidebar-sell-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="purchases.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我买到的</span>
                                <span id="sidebar-buy-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                        </div>
                    </div>

                    <a href="favorites.html" class="flex items-center justify-between px-4 py-2.5 bg-purple-50 text-purple-600 font-bold rounded-lg">
                        <div class="flex items-center space-x-3"><span>⭐</span><span>我的收藏</span></div>
                        <span id="sidebar-fav-count" class="text-xs text-purple-600 font-bold bg-purple-100 px-2 py-0.5 rounded-full">0</span>
                    </a>
                </nav>
                <div class="mt-6 pt-4 border-t border-gray-100 space-y-2">
                    <a href="trade.html" class="flex items-center justify-center space-x-2 px-4 py-2.5 bg-gray-50 text-gray-500 hover:text-purple-600 hover:bg-purple-50 rounded-xl transition font-medium text-sm">
                        <span>&larr;</span>
                        <span>返回大厅</span>
                    </a>
                    <button id="logout-btn" class="w-full flex items-center justify-center space-x-2 px-4 py-2.5 bg-purple-100 text-purple-700 hover:bg-purple-200 rounded-xl transition font-medium text-sm">
                        <span>🚪</span>
                        <span>退出登录</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 右侧内容 -->
        <main class="flex-1">
            <!-- 标签栏 -->
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden mb-4">
                <div class="flex border-b border-gray-100">
                    <a href="javascript:;" class="fav-tab flex-none px-6 py-3.5 text-sm font-bold text-purple-600 relative" data-tab="all">
                        全部
                        <div class="tab-bar absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-0.5 bg-purple-600 rounded-full"></div>
                    </a>
                    <a href="javascript:;" class="fav-tab flex-none px-6 py-3.5 text-sm text-gray-500 hover:text-purple-600 transition" data-tab="discount">降价宝贝</a>
                    <a href="javascript:;" class="fav-tab flex-none px-6 py-3.5 text-sm text-gray-500 hover:text-purple-600 transition" data-tab="active">有效宝贝</a>
                    <a href="javascript:;" class="fav-tab flex-none px-6 py-3.5 text-sm text-gray-500 hover:text-purple-600 transition" data-tab="expired">失效宝贝</a>
                </div>
            </div>

            <!-- 商品网格 -->
            <div id="fav-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- FAV_GRID_PLACEHOLDER -->
            </div>
        </main>
    </div>

<script>
// 颜色池
var bgColors = [
    'from-amber-200 to-orange-300', 'from-green-200 to-emerald-300',
    'from-sky-200 to-blue-300', 'from-violet-200 to-purple-300',
    'from-cyan-200 to-teal-300', 'from-rose-200 to-pink-300',
    'from-lime-200 to-green-300', 'from-indigo-200 to-blue-300',
    'from-fuchsia-200 to-pink-300', 'from-red-200 to-rose-300'
];

// Mock 收藏数据
var mockFavItems = [
    { id: 'mock_1', title: '简历修改一对一优化，12小时极速出稿', price: 14, emoji: '📝', bg: 'from-amber-200 to-orange-300', tag: 'active' },
    { id: 'mock_2', title: '最新版王道408PPT印版，考研必备资料', price: 38, emoji: '📚', bg: 'from-green-200 to-emerald-300', tag: 'active' },
    { id: 'mock_3', title: '全国漫展动漫节游戏嘉年华代抢取号代售', price: 20, emoji: '🎭', bg: 'from-sky-200 to-blue-300', tag: 'active' },
    { id: 'mock_4', title: '程序员接单，网站/小程序/APP开发', price: 500, emoji: '💻', bg: 'from-violet-200 to-purple-300', tag: 'active' },
    { id: 'mock_5', title: 'AirPods Pro 2 USB-C版 九成新 带盒', price: 980, emoji: '🎧', bg: 'from-cyan-200 to-teal-300', tag: 'discount', oldPrice: 1100 },
    { id: 'mock_6', title: '索尼WH-1000XM5 头戴降噪 铂金银', price: 1200, emoji: '🎵', bg: 'from-rose-200 to-pink-300', tag: 'discount', oldPrice: 1500 },
    { id: 'mock_7', title: '张宇高数18讲+1000题 2025版 全新', price: 35, emoji: '📘', bg: 'from-lime-200 to-green-300', tag: 'active' },
    { id: 'mock_8', title: '小米台式风扇 静音款 三挡风速 白色', price: 20, emoji: '🌀', bg: 'from-indigo-200 to-blue-300', tag: 'expired' },
    { id: 'mock_9', title: 'Switch OLED 日版 白色 带健身环', price: 1500, emoji: '🎮', bg: 'from-fuchsia-200 to-pink-300', tag: 'active' }
];

// 从 localStorage 读取用户收藏的商品，合并到列表
function loadUserFavs() {
    try {
        var stored = JSON.parse(localStorage.getItem('azureFavs') || '[]');
        return stored.map(function(f, i) {
            return {
                id: f.id,
                title: f.title,
                price: f.price,
                emoji: f.emoji || '📦',
                bg: bgColors[i % bgColors.length],
                tag: 'active'
            };
        });
    } catch(e) { return []; }
}

function getAllFavItems() {
    var userFavs = loadUserFavs();
    return userFavs.concat(mockFavItems);
}

var grid = document.getElementById('fav-grid');
var tabs = document.querySelectorAll('.fav-tab');

function renderFavGrid(filter) {
    var favItems = getAllFavItems();
    grid.innerHTML = '';
    var list = filter === 'all' ? favItems : favItems.filter(function(item) { return item.tag === filter; });
    if (list.length === 0) {
        grid.innerHTML = '<div class="col-span-3 flex flex-col items-center justify-center py-20 text-gray-400"><span class="text-5xl mb-3">📭</span><p>暂无收藏商品</p></div>';
        return;
    }
    list.forEach(function(item) {
        var isExpired = item.tag === 'expired';
        var card = document.createElement('div');
        card.className = 'bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition cursor-pointer' + (isExpired ? ' opacity-60' : '');
        var discountHtml = item.oldPrice ? '<span class="absolute top-2 left-2 text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded font-bold">降价</span>' : '';
        var expiredHtml = isExpired ? '<span class="absolute top-2 right-2 text-[10px] bg-gray-500 text-white px-1.5 py-0.5 rounded font-bold">已失效</span>' : '';
        card.innerHTML =
            '<div class="relative h-44 bg-gradient-to-br ' + item.bg + ' flex items-center justify-center text-5xl">' +
                item.emoji + discountHtml + expiredHtml +
            '</div>' +
            '<div class="p-3">' +
                '<p class="text-sm text-gray-800 leading-snug line-clamp-2">' + item.title + '</p>' +
                '<div class="flex items-center gap-2 mt-2">' +
                    '<span class="text-orange-500 font-black">¥' + item.price + '</span>' +
                    (item.oldPrice ? '<span class="text-gray-400 line-through text-xs">¥' + item.oldPrice + '</span>' : '') +
                '</div>' +
            '</div>';
        card.addEventListener('click', function() { window.location.href = 'product.html?id=' + item.id; });
        grid.appendChild(card);
    });
}

tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
        tabs.forEach(function(t) {
            t.classList.remove('font-bold', 'text-purple-600');
            t.classList.add('text-gray-500');
            var bar = t.querySelector('.tab-bar');
            if (bar) bar.remove();
        });
        tab.classList.remove('text-gray-500');
        tab.classList.add('font-bold', 'text-purple-600');
        var indicator = document.createElement('div');
        indicator.className = 'tab-bar absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-0.5 bg-purple-600 rounded-full';
        tab.appendChild(indicator);
        renderFavGrid(tab.dataset.tab);
    });
});

renderFavGrid('all');

// 我的交易 展开/收起
var toggle = document.getElementById('trade-toggle');
var sub = document.getElementById('trade-sub');
var arrow = document.getElementById('trade-arrow');
toggle.addEventListener('click', function() {
    var hidden = sub.style.display === 'none';
    sub.style.display = hidden ? '' : 'none';
    arrow.classList.toggle('rotate-180', hidden);
});

// 退出登录
var logoutBtn = document.getElementById('logout-btn');
if (logoutBtn) {
    logoutBtn.addEventListener('click', async function () {
        try {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
        } catch (e) {}
        window.location.href = '/login?redirect=/azure_trade/trade';
    });
}

// 侧边栏气泡数字
(function() {
    var profile = {};
    try { profile = JSON.parse(localStorage.getItem('userProfile') || '{}'); } catch(e) {}
    var published = JSON.parse(localStorage.getItem('publishedItems') || '[]');
    var sold = JSON.parse(localStorage.getItem('soldItems') || '[]');
    var bought = JSON.parse(localStorage.getItem('boughtItems') || '[]');

    var counts = {
        'sidebar-publish-count': profile.posts || published.length,
        'sidebar-sell-count': profile.sell || sold.length,
        'sidebar-buy-count': profile.buy || bought.length,
        'sidebar-fav-count': profile.favorites || JSON.parse(localStorage.getItem('favoriteItems') || '[]').length
    };
    Object.keys(counts).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = counts[id];
    });
})();
</script>

</body>
</html>
