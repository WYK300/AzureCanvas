<script>
    // --- 1. 倒计时跳动逻辑 ---
    let timeRemaining = 86100; // 23小时 55分钟
    const timerElement = document.getElementById('countdown-timer');

    function updateCountdown() {
        if (timeRemaining <= 0) {
            timerElement.textContent = "00小时 00分 00秒";
            return;
        }

        let hours = Math.floor(timeRemaining / 3600);
        let minutes = Math.floor((timeRemaining % 3600) / 60);
        let seconds = timeRemaining % 60;

        let formattedHours = hours < 10 ? '0' + hours : hours;
        let formattedMinutes = minutes < 10 ? '0' + minutes : minutes;
        let formattedSeconds = seconds < 10 ? '0' + seconds : seconds;

        timerElement.textContent = `${formattedHours}小时 ${formattedMinutes}分 ${formattedSeconds}秒`;
        timeRemaining--;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // --- 2. 支付弹窗交互逻辑 ---
    const modal = document.getElementById('payment-modal');
    const backdrop = document.getElementById('payment-backdrop');
    const sheet = document.getElementById('payment-sheet');

    // 打开弹窗：运用了先显示DOM，再执行CSS动画的丝滑技巧
    function openPaymentModal() {
        modal.classList.remove('hidden');
        // 强制浏览器重绘，确保动画生效
        void modal.offsetWidth; 
        
        backdrop.classList.remove('opacity-0');
        sheet.classList.remove('translate-y-full');
    }

    // 关闭弹窗：先执行动画，动画结束后再隐藏DOM
    function closePaymentModal() {
        backdrop.classList.add('opacity-0');
        sheet.classList.add('translate-y-full');
        
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300); // 300ms 与 CSS 的 duration-300 对齐
    }

    // 点击确认付款的逻辑
    function confirmPayment() {
        alert("🎉 支付成功！卖家将尽快为您发货。");
        // 这里可以直接跳转到之前的“我买到的”页面
        window.location.href = "purchases.html";
    }
</script>
