<script>
var myItems = [
    { title: '包邮【全部包出】纸飞机折纸套装十款精选', price: 280, wants: 11, emoji: '✈️', bg: 'from-sky-200 to-blue-300' },
    { title: '包邮【出闪器】可甜蜜 全新未拆', price: 1100, wants: 3, emoji: '📷', bg: 'from-amber-200 to-orange-300' },
    { title: '包邮【闪】在马来西亚的铁路旅行时间60分钟/路径', price: 200, wants: 1, emoji: '🚂', bg: 'from-green-200 to-emerald-300' },
    { title: '【出】出几瓶xvvip 时间60甜蜜/路径', price: 358, wants: 0, emoji: '🧴', bg: 'from-pink-200 to-rose-300' },
    { title: '【出】耳机苹果原装门口129的5折 手机壳出', price: 230, wants: 0, emoji: '🎧', bg: 'from-violet-200 to-purple-300' },
    { title: '机械键盘 Cherry红轴 九成新 带灯', price: 180, wants: 5, emoji: '⌨️', bg: 'from-red-200 to-rose-300' }
];

var reviews = [
    { name: '快乐同学', avatar: 'K', text: '发货很快，东西和描述一致，沟通非常愉快！而且卖家非常细心包装得很严实，下次还会再来的！', time: '2026-04-08 14:30', rating: 5, role: 'buyer' },
    { name: '学霸小铺', avatar: 'X', text: '包装很好，没有损坏，非常满意。', time: '2026-04-06 09:15', rating: 4, role: 'buyer' },
    { name: '佛系卖家', avatar: 'F', text: '同学人很好，面交很准时。', time: '2026-04-04 18:45', rating: 5, role: 'seller' },
    { name: '挑剔的鱼', avatar: 'T', text: '有点小瑕疵，但考虑到是二手价格整体还行吧。', time: '2026-03-28 11:20', rating: 3, role: 'buyer' }
];

var grid = document.getElementById('profile-grid');
var reviewsPanel = document.getElementById('reviews-panel');
var reviewsList = document.getElementById('reviews-list');
var tabs = document.querySelectorAll('.profile-tab');

function renderItems() {
    grid.innerHTML = '';
    myItems.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer';
        card.innerHTML =
            '<div class="h-40 bg-gradient-to-br ' + item.bg + ' flex items-center justify-center text-5xl relative">' + item.emoji + '</div>' +
            '<div class="p-3">' +
                '<p class="text-sm text-gray-800 leading-snug line-clamp-2">' + item.title + '</p>' +
                '<div class="flex items-center justify-between mt-2">' +
                    '<span class="text-purple-600 font-black">¥' + item.price + '</span>' +
                    '<span class="text-xs text-gray-400">' + item.wants + '人想要</span>' +
                '</div>' +
            '</div>';
            
        // 👇 新增：添加点击跳转事件
        card.addEventListener('click', function() {
            // 跳转到商品详情页（如果有具体的 id 也可以用 product.html?id=xxx）
            window.location.href = 'product.html';
        });

        grid.appendChild(card);
    });
}

function updateFilterCounts() {
    var countGood = reviews.filter(r => r.rating >= 4).length;
    var countBuyer = reviews.filter(r => r.role === 'buyer').length;
    var countSeller = reviews.filter(r => r.role === 'seller').length;

    document.getElementById('count-all').textContent = reviews.length;
    document.getElementById('count-good').textContent = countGood;
    document.getElementById('count-buyer').textContent = countBuyer;
    document.getElementById('count-seller').textContent = countSeller;
    document.getElementById('reviews-count-tab').textContent = reviews.length;
}

function renderReviews(dataToRender) {
    reviewsList.innerHTML = '';
    
    if (dataToRender.length === 0) {
        reviewsList.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm">暂无符合条件的评价</div>';
        return;
    }

    dataToRender.forEach(function(r) {
        var stars = '';
        for (var i = 0; i < 5; i++) stars += i < r.rating ? '⭐' : '☆';
        
        // 角色标签
        var roleTag = r.role === 'buyer' 
            ? '<span class="bg-blue-50 text-blue-500 px-1.5 py-0.5 rounded text-[10px] whitespace-nowrap">来自买家</span>'
            : '<span class="bg-green-50 text-green-600 px-1.5 py-0.5 rounded text-[10px] whitespace-nowrap">来自卖家</span>';
        
        // 🌟 核心修改 1：将好评标签变成了 inline-block，这样它就能像一个“字”一样完美融入文本行内
        var ratingTag = r.rating >= 4 
            ? '<span class="inline-block bg-orange-50 text-orange-500 px-1.5 py-[2px] rounded text-[10px] mr-1.5 align-text-bottom">好评</span>'
            : '';

        var div = document.createElement('div');
        div.className = 'bg-white rounded-xl p-4 shadow-sm border border-gray-100';
        
        div.innerHTML =
            '<div class="flex items-start justify-between mb-2">' +
                '<div class="flex items-center gap-3">' +
                    '<div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-sm text-purple-600 font-bold flex-shrink-0">' + r.avatar + '</div>' +
                    '<div class="flex flex-col">' +
                        '<div class="flex items-center gap-2">' +
                            '<span class="text-sm font-bold text-gray-800">' + r.name + '</span>' +
                            roleTag +
                        '</div>' +
                        // 🌟 核心修改 2：把原本在这里的时间删掉了
                    '</div>' +
                '</div>' +
                '<span class="text-xs flex-shrink-0 mt-1">' + stars + '</span>' +
            '</div>' +
            // 🌟 核心修改 3：标签和文本被合并到了同一个 <p> 标签里，保证同行折行；并在下方新增了时间
            '<div class="pl-[52px]">' + 
                '<p class="text-sm text-gray-600 leading-relaxed">' + ratingTag + r.text + '</p>' +
                '<div class="text-[11px] text-gray-400 mt-2">' + r.time + '</div>' +
            '</div>';
            
        reviewsList.appendChild(div);
    });
}

// 筛选逻辑
var filterRadios = document.querySelectorAll('input[name="review_filter"]');
filterRadios.forEach(function(radio) {
    radio.addEventListener('change', function(e) {
        var filterValue = e.target.value;
        var filteredData = reviews;

        if (filterValue === 'good') {
            filteredData = reviews.filter(r => r.rating >= 4);
        } else if (filterValue === 'buyer') {
            filteredData = reviews.filter(r => r.role === 'buyer');
        } else if (filterValue === 'seller') {
            filteredData = reviews.filter(r => r.role === 'seller');
        }

        renderReviews(filteredData);
    });
});

// Tab 切换逻辑
tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
        tabs.forEach(function(t) {
            t.classList.remove('font-bold', 'text-purple-600');
            t.classList.add('text-gray-500');
            var bar = t.querySelector('.tab-bar');
            if (bar) {
                bar.classList.remove('opacity-100', 'scale-100');
                bar.classList.add('opacity-0', 'scale-0');
            }
        });
        
        tab.classList.remove('text-gray-500');
        tab.classList.add('font-bold', 'text-purple-600');
        var activeBar = tab.querySelector('.tab-bar');
        if (activeBar) {
            activeBar.classList.remove('opacity-0', 'scale-0');
            activeBar.classList.add('opacity-100', 'scale-100');
        }

        if (tab.dataset.tab === 'items') {
            grid.classList.remove('hidden');
            reviewsPanel.classList.add('hidden');
        } else {
            grid.classList.add('hidden');
            reviewsPanel.classList.remove('hidden');
        }
    });
});

// 左侧菜单折叠逻辑
var toggle = document.getElementById('trade-toggle');
var sub = document.getElementById('trade-sub');
var arrow = document.getElementById('trade-arrow');
if(toggle && sub && arrow) {
    toggle.addEventListener('click', function() {
        var hidden = sub.style.display === 'none';
        sub.style.display = hidden ? '' : 'none';
        arrow.classList.toggle('rotate-180', hidden);
    });
}

// 初始化执行
renderItems();
updateFilterCounts();
renderReviews(reviews);

// ========== localStorage 持久化 + API 调用 ==========
function loadProfileFromStorage() {
    var saved = localStorage.getItem('userProfile');
    if (!saved) return null;
    try { return JSON.parse(saved); } catch (e) { return null; }
}

function saveProfileToStorage(data) {
    var existing = loadProfileFromStorage() || {};
    Object.keys(data).forEach(function (k) { existing[k] = data[k]; });
    localStorage.setItem('userProfile', JSON.stringify(existing));
}

function applyProfileToPage(data) {
    var profileUsername = document.getElementById('profile-username');
    var profileAvatar = document.getElementById('profile-avatar');
    var profileBio = document.getElementById('profile-bio');
    var profileFollowers = document.getElementById('profile-followers');
    var profileFollowing = document.getElementById('profile-following');
    var profilePosts = document.getElementById('profile-posts');
    var sidebarFav = document.getElementById('sidebar-fav-count');

    if (profileUsername && data.username) profileUsername.textContent = data.username;

    if (profileAvatar) {
        if (data.avatar_url) {
            profileAvatar.innerHTML = '<img src="' + data.avatar_url + '" class="w-20 h-20 rounded-full object-cover">';
            profileAvatar.className = 'w-20 h-20 rounded-full border-4 border-white shadow-md overflow-hidden z-10 relative';
        } else if (data.username) {
            profileAvatar.textContent = data.username.charAt(0).toUpperCase();
        }
    }

    if (profileBio) profileBio.textContent = data.bio || '这个人很懒，什么都没写~';

    var profileEmail = document.getElementById('profile-email');
    if (profileEmail && data.email) {
        profileEmail.querySelector('span').textContent = data.email;
        profileEmail.classList.remove('hidden');
    }

    if (profileFollowers) profileFollowers.textContent = data.followers || 0;
    if (profileFollowing) profileFollowing.textContent = data.followings || data.following || 0;

    // 从 localStorage 统计各项数量
    var publishedItems = JSON.parse(localStorage.getItem('publishedItems') || '[]');
    var soldItems = JSON.parse(localStorage.getItem('soldItems') || '[]');
    var boughtItems = JSON.parse(localStorage.getItem('boughtItems') || '[]');
    var favoriteItems = JSON.parse(localStorage.getItem('favoriteItems') || '[]');

    var postsCount = data.posts || publishedItems.length;
    var sellCount = data.sell || soldItems.length;
    var buyCount = data.buy || boughtItems.length;
    var favCount = data.favorites || favoriteItems.length;

    if (profilePosts) profilePosts.textContent = postsCount;
    if (document.getElementById('items-count')) document.getElementById('items-count').textContent = postsCount;

    var profileSell = document.getElementById('profile-sell');
    var profileBuy = document.getElementById('profile-buy');
    if (profileSell) profileSell.textContent = sellCount;
    if (profileBuy) profileBuy.textContent = buyCount;

    // 侧边栏气泡
    var sidebarPublish = document.getElementById('sidebar-publish-count');
    var sidebarSell = document.getElementById('sidebar-sell-count');
    var sidebarBuy = document.getElementById('sidebar-buy-count');

    if (sidebarPublish) sidebarPublish.textContent = postsCount;
    if (sidebarSell) sidebarSell.textContent = sellCount;
    if (sidebarBuy) sidebarBuy.textContent = buyCount;

    if (sidebarFav) {
        sidebarFav.textContent = favCount;
    }
}

// 先从 localStorage 加载（立即显示）
var cachedProfile = loadProfileFromStorage();
if (cachedProfile) applyProfileToPage(cachedProfile);

// 再从 API 获取最新数据
(async function () {
    try {
        var response = await fetch('/api/users/me', {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        });

        if (response.ok) {
            var user = await response.json();
            saveProfileToStorage(user);
            applyProfileToPage(user);
        } else if (response.status === 401) {
            window.location.href = '/login?redirect=/azure_trade/trade';
        }
    } catch (err) {
        console.error('获取用户信息失败:', err);
    }
})();

// ========== 退出登录 ==========
var logoutBtn = document.getElementById('logout-btn');
if (logoutBtn) {
    logoutBtn.addEventListener('click', async function () {
        try {
            await fetch('/api/auth/logout', {
                method: 'POST',
                credentials: 'include'
            });
        } catch (e) {}
        window.location.href = '/login?redirect=/azure_trade/trade';
    });
}

// ========== 背景横幅更换 ==========
var banner = document.getElementById('profile-banner');
var bannerInput = document.getElementById('banner-input');

// 加载已保存的背景
var savedBanner = localStorage.getItem('profileBanner');
if (savedBanner && banner) {
    banner.style.backgroundImage = 'url(' + savedBanner + ')';
    banner.style.backgroundSize = 'cover';
    banner.style.backgroundPosition = 'center';
    banner.className = banner.className.replace(/bg-gradient-to-r\s+from-\S+\s+via-\S+\s+to-\S+/, '');
}

if (banner && bannerInput) {
    banner.addEventListener('click', function (e) {
        if (e.target.closest('#edit-profile-btn')) return;
        bannerInput.click();
    });

    bannerInput.addEventListener('change', function () {
        var file = bannerInput.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
            var dataUrl = ev.target.result;
            banner.style.backgroundImage = 'url(' + dataUrl + ')';
            banner.style.backgroundSize = 'cover';
            banner.style.backgroundPosition = 'center';
            banner.className = banner.className.replace(/bg-gradient-to-r\s+from-\S+\s+via-\S+\s+to-\S+/, '');
            localStorage.setItem('profileBanner', dataUrl);
        };
        reader.readAsDataURL(file);
    });
}

// ========== 编辑主页弹窗 ==========
var editModal = document.getElementById('edit-modal');
var editBtn = document.getElementById('edit-profile-btn');
var editCloseBtn = document.getElementById('edit-close-btn');
var editForm = document.getElementById('edit-profile-form');
var editAvatarInput = document.getElementById('edit-avatar-input');
var editAvatarPreview = document.getElementById('edit-avatar-preview');
var customInterests = [];

function openEditModal() {
    var usernameEl = document.getElementById('profile-username');
    var bioEl = document.getElementById('profile-bio');
    if (usernameEl) editForm.username.value = usernameEl.textContent;
    if (bioEl) editForm.bio.value = bioEl.textContent === '这个人很懒，什么都没写~' ? '' : bioEl.textContent;

    // 从 localStorage 回填 email、性别、生日、兴趣
    var saved = loadProfileFromStorage() || {};
    if (saved.email) editForm.email.value = saved.email;
    if (saved.gender) {
        var genderRadio = editForm.querySelector('input[name="gender"][value="' + saved.gender + '"]');
        if (genderRadio) genderRadio.checked = true;
    }
    if (saved.birthday) editForm.birthday.value = saved.birthday;
    if (saved.interests) {
        var interests = saved.interests.split(',');
        var presetTags = document.querySelectorAll('input[name="interest_tag"]');
        presetTags.forEach(function(cb) { cb.checked = interests.indexOf(cb.value) !== -1; });
        customInterests = [];
        interests.forEach(function(tag) {
            var isPreset = false;
            presetTags.forEach(function(cb) { if (cb.value === tag) isPreset = true; });
            if (!isPreset && tag.trim()) customInterests.push(tag.trim());
        });
        renderCustomInterests();
    }

    var avatarEl = document.getElementById('profile-avatar');
    if (avatarEl) {
        var img = avatarEl.querySelector('img');
        if (img) {
            editAvatarPreview.innerHTML = '<img src="' + img.src + '" class="w-16 h-16 rounded-full object-cover">';
        } else {
            editAvatarPreview.textContent = avatarEl.textContent;
        }
    }

    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
}

function closeEditModal() {
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
}

if (editBtn) editBtn.addEventListener('click', openEditModal);
if (editCloseBtn) editCloseBtn.addEventListener('click', closeEditModal);
editModal.addEventListener('click', function (e) {
    if (e.target === editModal) closeEditModal();
});

// 头像预览
if (editAvatarInput) {
    editAvatarInput.addEventListener('change', function () {
        var file = editAvatarInput.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
            editAvatarPreview.innerHTML = '<img src="' + ev.target.result + '" class="w-16 h-16 rounded-full object-cover">';
        };
        reader.readAsDataURL(file);
    });
}

// ========== 自定义兴趣标签 ==========
var customInterestInput = document.getElementById('custom-interest-input');
var addInterestBtn = document.getElementById('add-interest-btn');
var customInterestsContainer = document.getElementById('custom-interests');

function addCustomInterest(text) {
    text = text.trim();
    if (!text || customInterests.indexOf(text) !== -1) return;
    customInterests.push(text);
    renderCustomInterests();
}

function renderCustomInterests() {
    customInterestsContainer.innerHTML = '';
    customInterests.forEach(function (tag, idx) {
        var span = document.createElement('span');
        span.className = 'inline-flex items-center gap-1 px-3 py-1.5 bg-purple-100 text-purple-700 rounded-full text-xs font-bold';
        span.innerHTML = tag + '<button type="button" class="ml-1 text-purple-400 hover:text-purple-700 text-sm leading-none">&times;</button>';
        span.querySelector('button').addEventListener('click', function () {
            customInterests.splice(idx, 1);
            renderCustomInterests();
        });
        customInterestsContainer.appendChild(span);
    });
}

if (addInterestBtn) {
    addInterestBtn.addEventListener('click', function () {
        addCustomInterest(customInterestInput.value);
        customInterestInput.value = '';
    });
}
if (customInterestInput) {
    customInterestInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addCustomInterest(customInterestInput.value);
            customInterestInput.value = '';
        }
    });
}

// ========== 保存编辑 ==========
editForm.addEventListener('submit', async function (e) {
    e.preventDefault();

    var formData = new FormData(editForm);
    var username = formData.get('username') || '';
    var bio = formData.get('bio') || '';
    var email = formData.get('email') || '';
    var gender = formData.get('gender') || 'secret';
    var birthday = formData.get('birthday') || '';

    // 收集兴趣：预设标签 + 自定义
    var selectedTags = [];
    document.querySelectorAll('input[name="interest_tag"]:checked').forEach(function (cb) {
        selectedTags.push(cb.value);
    });
    var allInterests = selectedTags.concat(customInterests).join(',');

    // 头像处理
    var avatarFile = editAvatarInput.files[0];
    var avatarUrl = '';
    var previewImg = editAvatarPreview.querySelector('img');
    if (previewImg) avatarUrl = previewImg.src;

    // 更新页面显示
    var profileUsername = document.getElementById('profile-username');
    var profileBio = document.getElementById('profile-bio');
    var profileAvatar = document.getElementById('profile-avatar');

    if (profileUsername && username) profileUsername.textContent = username;
    if (profileBio) profileBio.textContent = bio || '这个人很懒，什么都没写~';

    if (avatarUrl && profileAvatar) {
        profileAvatar.innerHTML = '<img src="' + avatarUrl + '" class="w-20 h-20 rounded-full object-cover">';
        profileAvatar.className = 'w-20 h-20 rounded-full border-4 border-white shadow-md overflow-hidden z-10 relative';
    }

    // 保存到 localStorage
    saveProfileToStorage({
        username: username,
        bio: bio,
        email: email,
        gender: gender,
        birthday: birthday,
        interests: allInterests,
        avatar_url: avatarUrl
    });

    // 调用后端保存
    try {
        var uploadData = new FormData();
        uploadData.append('username', username);
        uploadData.append('bio', bio);
        uploadData.append('email', email);
        uploadData.append('gender', gender);
        uploadData.append('birthday', birthday);
        uploadData.append('interests', allInterests);
        if (avatarFile) uploadData.append('avatar', avatarFile);

        await fetch('/api/users/profile', {
            method: 'PUT',
            credentials: 'include',
            body: uploadData
        });
    } catch (err) {
        console.error('保存个人信息失败:', err);
    }

    closeEditModal();
});
</script>
