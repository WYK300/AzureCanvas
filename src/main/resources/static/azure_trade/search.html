<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - AzureTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#7c3aed' } } }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- ===== 顶部导航 ===== -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">
            <div class="flex items-center space-x-1 shrink-0">
                <div class="bg-purple-600 text-white text-2xl font-black px-3 py-1 rounded-lg">闲置</div>
                <span class="text-purple-700 text-xl font-bold tracking-wide">AzureTrade</span>
            </div>
            <div class="flex-1 max-w-xl mx-8">
                <div class="flex">
                    <input id="search-input" type="text" placeholder="搜索校园闲置好物..."
                           class="flex-1 border-2 border-purple-400 rounded-l-full px-5 py-2 text-sm focus:outline-none focus:border-purple-600">
                    <button id="search-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-r-full text-sm font-semibold transition">
                        🔍 搜索
                    </button>
                </div>
            </div>
            <div class="flex items-center space-x-4 shrink-0">
                <a href="trade.html" class="text-sm text-gray-500 hover:text-purple-600">返回交易</a>
                <span class="text-gray-300">|</span>
                <a href="../index.html" class="text-sm text-gray-500 hover:text-purple-600">返回主页</a>
            </div>
        </div>
    </header>

    <!-- ===== 通知横幅 ===== -->
    <div class="bg-purple-50 border-b border-purple-100">
        <div class="max-w-7xl mx-auto px-4 py-1.5 text-xs text-purple-700 flex items-center space-x-2">
            <span class="bg-purple-600 text-white px-1.5 py-0.5 rounded text-[10px] font-bold">公告</span>
            <span>校园闲置交易功能全新升级！支持担保交易，买卖更放心～</span>
        </div>
    </div>
<!-- SEARCH_PLACEHOLDER -->

    <!-- ===== 主体内容 ===== -->
    <main class="max-w-7xl mx-auto px-4 py-4">

        <!-- 搜索结果标题 -->
        <div class="flex items-center space-x-2 mb-3">
            <h1 id="search-title" class="text-lg font-bold text-gray-800"></h1>
            <span id="result-count" class="text-sm text-gray-400"></span>
        </div>

        <!-- ===== 排序栏 ===== -->
        <div class="bg-white rounded-t-xl px-4 py-3 flex items-center space-x-6 border-b border-gray-100">
            <a href="javascript:;" class="sort-tab text-sm font-bold text-purple-600 border-b-2 border-purple-600 pb-1" data-sort="default">综合</a>
            <a href="javascript:;" class="sort-tab text-sm text-gray-500 hover:text-purple-600 pb-1" data-sort="new-price">新降价</a>
            <a href="javascript:;" class="sort-tab text-sm text-gray-500 hover:text-purple-600 pb-1" data-sort="new-post">新发布</a>
            <a href="javascript:;" class="sort-tab text-sm text-gray-500 hover:text-purple-600 pb-1 flex items-center" data-sort="price">
                价格
                <svg class="w-3 h-3 ml-0.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5 5 5M7 13l5 5 5-5"/></svg>
            </a>
            <a href="javascript:;" class="sort-tab text-sm text-gray-500 hover:text-purple-600 pb-1" data-sort="area">区域</a>
        </div>

        <!-- ===== 标签筛选栏（多选） ===== -->
        <div class="bg-white px-4 py-2.5 flex items-center space-x-2 overflow-x-auto border-b border-gray-100" style="-ms-overflow-style:none;scrollbar-width:none;">
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="个人闲置"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">个人闲置</span></label>
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="验货宝"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">验货宝</span></label>
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="账号担保"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">账号担保</span></label>
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="包邮"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">包邮</span></label>
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="超赞鱼小铺"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">超赞鱼小铺</span></label>
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="全新"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">全新</span></label>
            <label class="filter-tag shrink-0 cursor-pointer"><input type="checkbox" class="hidden" value="转卖"><span class="inline-block px-3 py-1 rounded-full text-xs border border-gray-200 bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600 select-none transition">转卖</span></label>
        </div>

        <!-- ===== 商品列表 ===== -->
        <div id="product-grid" class="bg-white rounded-b-xl px-4 py-4">
            <!-- JS 动态渲染 -->
        </div>
    </main>

    <script src="../js/app/seeds.js"></script>
    <script src="../js/app/search.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../js/effects/mouse-ripple.js"></script>
</body>

</html>
