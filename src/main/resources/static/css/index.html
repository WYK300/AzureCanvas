<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel = 'stylesheet' type="text/css" href="login.page.css">
</head>
<body>
    <div class="container">
        <span></span>
        <form id="signform">
            <h2>Login</h2>
            <div class="inputBox">
                <input type="text" placeholder="Please Enter Username">
            </div>
            <div class="inputBox">
                <input type="password" placeholder="Please Enter Password">
            </div>
            <div class="inputBox">
                <a href="#">Forgot Password?</a>
                <a href="#">Sign Up</a>
            </div>
            <div class="checkbox">
                <input type="checkbox" id="inputcheckbox">
                <label for="inputcheckbox">Remember Me</label>
            </div>
            <div class="inputBox">
                <input type="submit" value="Sign In">
            </div>
        </form>
    </div>
</body>
</html>
