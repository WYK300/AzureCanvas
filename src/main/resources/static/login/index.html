<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzureCanvas - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Aeonik', sans-serif;
        }

        /* 预加载页面样式 */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #001086 0%, #237bff 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }

        #preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .preloader-content {
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #preloader-canvas-container {
            width: 200px;
            height: 200px;
        }

        .loading-text-wrapper {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            color: #78eaff;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 800;
        }

        .loading-label {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #loading-percentage {
            font-size: 1.2rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #78eaff;
            box-shadow: 0 0 15px #78eaff;
            transition: width 0.3s ease;
        }

        #loading-status {
            color: rgba(120, 234, 255, 0.6);
            font-size: 0.8rem;
            text-align: center;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .login-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            pointer-events: none;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            pointer-events: auto;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .login-card.register-mode {
            width: 400px;
        }
        .form-content {
            transition: all 0.5s ease;
        }
        .register-fields {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .register-mode .register-fields {
            max-height: 300px;
            opacity: 1;
            margin-top: 10px;
        }
        .login-card h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #ff00ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }
        .login-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .toggle-auth {
            color: #00ffff;
            cursor: pointer;
            transition: color 0.3s;
        }
        .toggle-auth:hover {
            color: #ff00ff;
            text-decoration: underline;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }

        /* 头像选择对话框 */
        #avatar-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 32px;
            width: 400px;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #avatar-dialog.show {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .avatar-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .avatar-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }
        .avatar-preview-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 25px;
        }
        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, #ff00ff, #7000ff);
            box-shadow: 0 15px 35px rgba(112, 0, 255, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 40px;
        }
        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .dialog-actions {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }
        .action-btn {
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn-skip {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-skip:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        .btn-activate {
            background: #00ff88;
            color: #003311;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        .btn-activate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.5);
        }
        .btn-activate:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Activating Profile Screen (Fallback if 3D fails) */
        #activating-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        /* 3D Exit Animation */
        @keyframes form-fly-out {
            0% {
                transform: perspective(1000px) translate(-50%, -50%) rotateX(0deg) rotateY(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: perspective(1000px) translate(-50%, -50%) translateZ(1000px) rotateX(-45deg) rotateY(720deg) scale(5);
                opacity: 0;
            }
        }
        .form-exit-anim {
            animation: form-fly-out 2s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
            pointer-events: none !important;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
            "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js",
            "troika-three-text": "https://esm.sh/troika-three-text@0.47.1?external=three"
        }
    }
    </script>
</head>
<body>
    <!-- 预加载动画页面 -->
    <div id="preloader">
        <div class="preloader-content">
            <div id="preloader-canvas-container"></div>
            <div class="loading-text-wrapper">
                <span class="loading-label">Loading</span>
                <span id="loading-percentage">0%</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="loading-status">Initializing environment...</div>
        </div>
    </div>

    <div id="canvas-container"></div>
    
    <div class="login-overlay">
        <form class="login-card" id="auth-form">
            <h1 id="form-title">AZURE CANVAS</h1>
            
            <div class="form-content">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="register-fields">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="register-fields">
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm your password">
                    </div>
                </div>

                <div class="login-footer">
                    <div class="checkbox" id="remember-me-container">
                        <input type="checkbox" id="inputcheckbox">
                        <label for="inputcheckbox">Remember Me</label>
                    </div>
                    <span class="toggle-auth" id="toggle-auth-btn">Create Account</span>
                </div>
            </div>

            <button type="submit" class="login-btn" id="submit-btn">ENTER SYSTEM</button>
        </form>
    </div>

    <!-- Avatar Selection Dialog -->
    <div id="avatar-dialog">
        <h2 class="avatar-title">Choose Your Avatar</h2>
        <p class="avatar-subtitle">You can change it later on</p>
        
        <div class="avatar-preview-container">
            <div class="avatar-preview" id="avatar-preview">A</div>
        </div>
        
        <input type="file" id="avatar-upload" hidden accept="image/*">
        <button class="upload-btn" onclick="document.getElementById('avatar-upload').click()">Upload Photo</button>
        
        <div class="dialog-actions">
            <button class="action-btn btn-skip" id="skip-avatar">Skip</button>
            <button class="action-btn btn-activate" id="activate-account" disabled>Activate Account</button>
        </div>
    </div>

    <!-- Status Overlays -->
    <div id="activating-screen"></div>

    <script src="../js/notifications.js"></script>
    <script type="module">
        import { Preloader } from '../js/effects/preloader.js';
        window.Preloader = Preloader;
        Preloader.init();
    </script>
    <script type="module" src="../js/laserchannel/login-tunnel.js"></script>
    <script type="module" src="../js/login.logic.js"></script>
</body>
</html>
